<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Mock Test</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="exam-header">
        <div>
            <h2>SSC MOCK TEST</h2>
        </div>
        <div class="candidate-info">
            <span><strong>Name:</strong>Mayank</span>
            <span><strong>Reg No:</strong> 10475478961</span>
        </div>
        <div id="timer" class="timer">
            30:00
        </div>
    </div>
    <div class="progress-container">
        <div id="progressBar" class="progress-bar">
        </div>
    </div>
    <div class="main-container">
        <div class="question-panel">
            <div class="subject-title">
                <h3 id="subjectName">
                    Reasoning
                </h3>
            </div>
            <div class="question-number">
                Question
                <span id="questionNo">1</span>
                of 40
            </div>
            <div id="questionText" class="question-text">
                Question will appear here
            </div>
            <div class="options">
                <label>
                    <input type="radio" name="option" value="0">
                    <span id="option0"></span>
                </label>
                <label>
                    <input type="radio" name="option" value="1">
                    <span id="option1"></span>
                </label>
                <label>
                    <input type="radio" name="option" value="2">
                    <span id="option2"></span>
                </label>
                <label>
                    <input type="radio" name="option" value="3">
                    <span id="option3"></span>
                </label>
            </div>
            <div class="btn-group">
                <button class="prev-btn" onclick="previousQuestion()">
                    Previous
                </button>
                <button class="review-btn" onclick="markForReview()">
                    Mark For Review
                </button>
                <button class="save-btn" onclick="saveAndNext()">
                    Save & Next
                </button>
            </div>
        </div>
        <div class="palette-panel">
            <h3>Question Palette</h3>
            <div id="palette" class="palette">
            </div>
            <button class="submit-btn" onclick="submitTest()">
                Submit Test
            </button>
        </div>
    </div>
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>

</html>
